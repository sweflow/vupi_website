<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="fBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="fGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <ellipse cx="200" cy="150" rx="180" ry="130"
    fill="#5b21b6" opacity="0.14" filter="url(#fBloom)"/>

  <!--
    Thickness ~60px per arm (was ~38).
    Valley points kept same, just offset perpendicular by 30px each side.

    CHECK 1 valley: (140, 220)
      Left leg  top-left: (20,100) → valley
      Right leg valley → top-right: (380,20)
      Thickness 60 → offset ~30px perpendicular

    Left leg direction vector: (140-20, 220-100) = (120,120), len=169.7
    Perp unit: (120/169.7, -120/169.7) = (0.707, -0.707)
    Offset 30: (21.2, -21.2)

    Left leg polygon:
      (20-21,100+21)=(−1,121) → clip to (0,121)
      (20+21,100-21)=(41,79)
      (140+21,220-21)=(161,199)
      (140-21,220+21)=(119,241)

    Right leg direction: (380-140, 20-220) = (240,-200), len=312.8
    Perp unit: (-200/312.8, -240/312.8) = (-0.640, -0.767) ... simplified offset 30
    Approx offset: (−23, −23) perpendicular to diagonal

    Right leg polygon:
      (140-23,220+23)=(117,243)
      (140+23,220-23)=(163,197)
      (380+23,20-23)=(403,−3) → clip (380,0)
      (380-23,20+23)=(357,43)

    CHECK 2 (mirror of check1 horizontally around x=200):
      Valley: (260, 220)
      Left leg: (20,20) → (260,220)
      Right leg: (260,220) → (380,100)
  -->

  <!-- CHECK 1 — indigo, normal ✓ -->
  <!-- Left short leg -->
  <polygon
    points="0,122  42,78  162,198  120,242"
    fill="url(#g1)" filter="url(#fGlow)"/>
  <!-- Right long leg -->
  <polygon
    points="120,242  162,198  358,44  316,88"
    fill="url(#g1)" filter="url(#fGlow)"/>

  <!-- CHECK 2 — violet, mirrored ✓ -->
  <!-- Left long leg -->
  <polygon
    points="42,44  84,0  280,198  238,242"
    fill="url(#g2)" filter="url(#fGlow)"/>
  <!-- Right short leg -->
  <polygon
    points="238,242  280,198  400,78  358,122"
    fill="url(#g2)" filter="url(#fGlow)"/>

  <!-- WORDMARK -->
  <text x="200" y="165"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="62"
    letter-spacing="-1"
    fill="#0d0f1e"
    opacity="0.55">vupi.us</text>

  <text x="200" y="165"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="62"
    letter-spacing="-1"
    fill="white"
    opacity="0.95">vupi.us</text>

</svg>
