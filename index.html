<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vupi.us — Soluções em tecnologia</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

  <canvas id="bg"></canvas>

  <button class="theme-toggle" id="themeBtn" aria-label="Alternar tema">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <main class="hero">
    <div class="hero-content">
      <div class="brand-logo">
        <img src="logo.svg" alt="Vupi.us logo" class="brand-logo__img"/>
      </div>
      <h1 class="logo">
        <span class="logo-text" id="logoText"></span><span class="logo-cursor" id="logoCursor">|</span>
      </h1>
      <p class="subtitle" id="subtitle"></p>
      <div class="cards-group" id="ctaGroup">
        <a class="float-card" href="https://api.vupi.us/" target="_blank" rel="noopener" style="--delay:0s">
          <div class="float-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
          </div>
          <div class="float-card__body">
            <span class="float-card__title">API Vupi.us</span>

          </div>
          <svg class="float-card__arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="10" x2="17" y2="10"/>
            <polyline points="11 4 17 10 11 16"/>
          </svg>
        </a>
        <a class="float-card" href="https://api.vupi.us/doc" target="_blank" rel="noopener" style="--delay:0.12s">
          <div class="float-card__icon float-card__icon--alt">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="9" y1="13" x2="15" y2="13"/>
              <line x1="9" y1="17" x2="13" y2="17"/>
            </svg>
          </div>
          <div class="float-card__body">
            <span class="float-card__title">Documentação</span>
            <span class="float-card__desc">Guias, referências e exemplos de integração</span>
          </div>
          <svg class="float-card__arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="10" x2="17" y2="10"/>
            <polyline points="11 4 17 10 11 16"/>
          </svg>
        </a>
      </div>

      <a class="contact-btn" href="mailto:contato@vupi.us" style="--delay:0.24s">
        <div class="contact-btn__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <span class="contact-btn__label">Fale conosco</span>
        <span class="contact-btn__email">contato@vupi.us</span>
      </a>
    </div>
  </main>

  <footer class="site-footer">
    <span>© 2026 Vupi.us — Criado por Adimael S.</span>
  </footer>

  <script src="main.js?v=3"></script>
</body>
</html>
