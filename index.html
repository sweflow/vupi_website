<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vupi.us — Soluções em tecnologia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="bg"></canvas>

  <button class="theme-toggle" id="themeBtn" aria-label="Alternar tema">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <main class="hero">
    <div class="hero-content">
      <h1 class="logo">
        <span class="logo-text" id="logoText"></span><span class="logo-cursor" id="logoCursor">|</span>
      </h1>
      <p class="subtitle" id="subtitle"></p>
      <div class="cta-group" id="ctaGroup">
        <a class="cta-btn" href="https://api.vupi.us/" target="_blank" rel="noopener">
          <span>Acessar o projeto</span>
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="10" x2="17" y2="10"/>
            <polyline points="11 4 17 10 11 16"/>
          </svg>
        </a>
        <a class="cta-btn cta-btn--outline" href="https://api.vupi.us/doc" target="_blank" rel="noopener">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h12v12H4z"/>
            <line x1="8" y1="8" x2="12" y2="8"/>
            <line x1="8" y1="11" x2="12" y2="11"/>
            <line x1="8" y1="14" x2="10" y2="14"/>
          </svg>
          <span>Documentação</span>
        </a>
      </div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
